<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tela de Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background-color: #d9f0f2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
    }
    .login-container{ width: 100%; max-width: 1000px; padding: 40px; }
    .form-label{ font-size: 24px; font-weight: bold; color: #000; }
    .form-control{
      border-radius: 30px;
      background-color: #dcdcdc;
      border: none;
      height: 42px;
    }
    .btn-login{
      background: linear-gradient(to right, #d96cff, #8b4bd8);
      border: none;
      color: white;
      border-radius: 30px;
      width: 170px;
      font-size: 22px;
      font-weight: bold;
      padding: 10px;
      transition: 0.3s;
    }
    .btn-login:hover{
      opacity: 0.9;
      transform: scale(1.03);
    }
  </style>
</head>
<body>

  <div class="container login-container">
    <div class="row align-items-center">

      <!-- Imagem -->
      <div class="col-md-5 text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/295/295128.png" 
             alt="Login" class="img-fluid" style="width: 300px;">
      </div>

      <!-- Formulário -->
      <div class="col-md-7">
        <!-- ADICIONADO: tag form com o destino para a home.html -->
        <form action="home.html" method="GET">
          
          <div class="mb-4">
            <label class="form-label">EMAIL</label>
            <input type="email" class="form-control" required>
          </div>

          <div class="mb-4">
            <label class="form-label">SENHA</label>
            <input type="password" class="form-control" required>
          </div>

          <!-- ALTERADO: Agora é um botão de submit que envia o formulário e redireciona -->
          <div class="text-center mt-4">
            <button type="submit" class="btn btn-login">ENTRAR</button>
          </div>

        </form>

        <div class="register-text mt-4 text-center" style="font-size: 18px;">
          CASO VOCÊ NÃO TENHA CADASTRO<br>
        <a href="CadastroUsuario.html" style="color:#007bff; text-decoration:none;">CLIQUE AQUI 
          
          </a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
