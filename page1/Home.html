<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página Inicial</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      margin: 0;
      padding: 0;
      background-color: #d8f0f2;
      font-family: Georgia, serif;
    }
    .topo{
      background-color: #d7d5f0;
      padding: 15px 30px;
    }
    .menu-btn{
      background: linear-gradient(to right, #d96cff, #b665e7);
      border: none;
      border-radius: 30px;
      padding: 12px 25px;
      color: black;
      font-size: 20px;
      transition: 0.3s;
      text-decoration: none;
    }
    .menu-btn:hover{
      transform: scale(1.03);
      opacity: 0.9;
    }
    .conteudo{ min-height: 90vh; padding: 70px 50px; }
    .titulo{
      font-size: 70px;
      font-weight: bold;
      color: black;
    }
    .acao-btn{
      width: 100%;
      max-width: 450px;
      background: linear-gradient(to right, #d96cff, #b665e7);
      border: none;
      border-radius: 40px;
      padding: 25px;
      font-size: 28px;
      color: black;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .acao-btn:hover{
      transform: scale(1.03);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- TOPO -->
  <div class="topo">
    <div class="container-fluid">
      <div class="d-flex justify-content-end gap-3">
        <a href="home.html" class="menu-btn">PÁGINA INICIAL</a>
        <a href="login.html" class="menu-btn">SAIR</a>
      </div>
    </div>
  </div>

  <!-- CONTEÚDO -->
  <div class="container-fluid conteudo">
    <div class="row align-items-center">
      <div class="col-lg-6">
        <h1 class="titulo">SEJA BEM VINDO</h1>
        <p class="fs-3">Escolha uma das opções abaixo:</p>
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" alt="Ícone" style="width: 250px;">
      </div>

      <div class="col-lg-6">
        <div class="d-flex flex-column gap-4 align-items-center">
          <a href="CadastroProduto.html" class="acao-btn">CADASTRAR PRODUTO</a>
          <a href="CadastroUsuario.html" class="acao-btn">CADASTRAR CLIENTE</a>
          <a href="CadastroEquipe.html" class="acao-btn">CADASTRAR EQUIPE</a>
          <a href="CadastroVendedor.html" class="acao-btn">CADASTRAR VENDEDOR</a>
          <a href="CadastroVenda.html" class="acao-btn">CADASTRAR VENDA</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
