<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background-color: #d9f0f2;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
    }
    .cadastro-box{
      background-color: #d7d5f0;
      width: 100%;
      max-width: 570px;
      border-radius: 45px;
      padding: 60px 70px;
    }
    .form-label{ font-size: 24px; color: black; margin-bottom: 5px; }
    .form-control{
      background-color: #d9d9d9;
      border: none;
      border-radius: 30px;
      height: 42px;
      margin-bottom: 18px;
    }
    .btn-cadastro{
      background: linear-gradient(to right, #d96cff, #7d3cb5);
      border: none;
      color: white;
      border-radius: 30px;
      padding: 10px 35px;
      font-size: 20px;
      transition: 0.3s;
    }
    .btn-cadastro:hover{
      transform: scale(1.03);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="cadastro-box">
    <form>
      <div class="mb-2">
        <label class="form-label">NOME COMPLETO</label>
        <input type="text" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">EMAIL</label>
        <input type="email" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">SENHA</label>
        <input type="password" class="form-control">
      </div>

      <div class="mb-2">
        <label class="form-label">REPETIR SENHA</label>
        <input type="password" class="form-control">
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-cadastro">CADASTRAR</button>
      </div>

      <div class="text-center mt-4">
        Já tem cadastro? 
        <a href="Login.html" style="color:#007bff; text-decoration:none;">Faça login</a>
      </div>
    </form>
  </div>

</body>
</html>
