<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro de Equipe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body{
      background-color: #dff5f7;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
    }
    .card-cadastro{
      background-color: #d9d7f3;
      width: 500px;
      padding: 50px;
      border-radius: 40px;
      text-align: center;
    }
    .titulo{
      font-size: 32px;
      margin-bottom: 10px;
      color: black;
    }
    .form-control, .form-select{
      border-radius: 30px;
      border: none;
      background-color: #f0f0f0;
      height: 45px;
      margin-bottom: 35px;
    }
    .btn-cadastro{
      background: linear-gradient(to right, #d45cff, #7b2cbf);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 35px;
      font-size: 20px;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-cadastro:hover{ opacity: 0.8; }
  </style>
</head>
<body>

  <div class="card-cadastro">
    <form>
      <h2 class="titulo">NOME DA EQUIPE</h2>
      <input type="text" class="form-control" required>

      <h2 class="titulo">SETOR / ÁREA</h2>
      <select class="form-select text-center">
        <option selected disabled>Selecione o setor</option>
        <option value="vendas">Vendas</option>
        <option value="marketing">Marketing</option>
        <option value="suporte">Suporte</option>
      </select>

      <a href="Home.html" class="btn btn-cadastro">CADASTRAR EQUIPE</a>
    </form>
  </div>

</body>
</html>
