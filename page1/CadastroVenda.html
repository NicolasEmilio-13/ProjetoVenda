<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastrar Venda</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body{
      background-color: #dff5f7;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
    }
    .card-cadastro{
      background-color: #d9d7f3;
      width: 550px;
      padding: 40px 50px;
      border-radius: 40px;
      text-align: center;
    }
    .titulo{
      font-size: 24px;
      margin-bottom: 8px;
      color: black;
      font-weight: bold;
    }
    .form-control, .form-select{
      border-radius: 30px;
      border: none;
      background-color: #f0f0f0;
      height: 42px;
      margin-bottom: 20px;
    }
    .btn-cadastro{
      background: linear-gradient(to right, #d45cff, #7b2cbf);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 12px 35px;
      font-size: 20px;
      transition: 0.3s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-cadastro:hover{ opacity: 0.8; }
  </style>
</head>
<body>

  <div class="card-cadastro">
    <form>
      <h2 class="titulo">SELECIONE O CLIENTE</h2>
      <select class="form-select text-center">
        <option selected disabled>Selecione o cliente</option>
        <option value="1">João Silva</option>
        <option value="2">Maria Oliveira</option>
      </select>

      <h2 class="titulo">SELECIONE O PRODUTO</h2>
      <select class="form-select text-center">
        <option selected disabled>Selecione o produto</option>
        <option value="1">Produto A</option>
        <option value="2">Produto B</option>
      </select>

      <h2 class="titulo">QUANTIDADE</h2>
      <input type="number" class="form-control text-center" min="1" value="1" required>

      <h2 class="titulo">VENDEDOR RESPONSÁVEL</h2>
      <select class="form-select text-center">
        <option selected disabled>Selecione o vendedor</option>
        <option value="1">Carlos Souza</option>
        <option value="2">Ana Costa</option>
      </select>

      <a href="Home.html" class="btn btn-cadastro">FINALIZAR VENDA</a>
    </form>
  </div>

</body>
</html>
